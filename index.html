<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>ASC Tutor Management</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Bungee+Spice&family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Playfair+Display:ital,wght@0,600;1,600&family=Quicksand:wght@300..700&display=swap");

      * {
        font-family: "Inter", sans-serif;
        font-optical-sizing: auto;
        font-style: normal;
      }
      body {
        background-color: rgb(182, 182, 182);
        margin: 0;
      }

      .header-banner {
        width: 100%;
        height: 260px;
        overflow: hidden;
      }

      .header-banner img {
        object-fit: cover;
        width: 100%;
        height: 100%;
        object-position: center;
        display: block;
      }

      /*Container for the date arrows and the student feedback*/
      .arrow-feedback-container {
        display: flex;
        position: relative;
        align-items: center;
        margin-bottom: 15px;
      }

      .feedback-button {
        position: absolute;
        right: 0;
        color: black;
        border: black solid 1.5px;
        border-radius: 5px;
        padding: 8px 10px;
        cursor: pointer;
      }

      .date-button {
        display: flex;
        align-items: center;
        gap: 5px;
        margin: 0 auto;
      }

      .arrow-button {
        cursor: pointer;
      }

      .box {
        background-color: white;
        text-align: center;
        width: 83%;
        margin: 40px auto;
        margin-top: 35px;
        border-radius: 10px;
        padding: 35px;
        box-shadow:
          rgba(50, 50, 93, 0.25) 0px 50px 100px -20px,
          rgba(0, 0, 0, 0.3) 0px 30px 60px -30px,
          rgba(10, 37, 64, 0.35) 0px -2px 6px 0px inset;
      }

      .section {
        margin-bottom: 25px;
        border-radius: 10px;
        border: 1.6px solid black;
        overflow: hidden;
      }

      .section-title {
        padding: 7px;
        text-align: left;
        font-weight: bold;
      }

      /*Colors for section titles*/
      .late {
        background-color: #ffd580;
      }
      .active {
        background-color: #90ee90;
      }
      .upcoming {
        background-color: #9f9797;
      }
      .cancelled {
        background-color: #da7877;
      }
      .completed {
        background-color: violet;
      }

      h1 {
        text-align: left;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        background-color: white;
      }

      th {
        width: 20%;
        padding: 5px;
        text-align: center;
      }

      td {
        width: 20%;
        padding: 4px;
        text-align: center;
      }

      /*For the active section; Full cap: blue and Accepting: purple*/
      .status-full {
        background-color: #add8e6;
        padding: 4px;
      }
      .status-open {
        background-color: #cbc3e3;
        padding: 4px;
      }
    </style>
  </head>
  <body>
    <div class="header-banner">
      <img src="data/UMBC header.png" alt="UMBC Academic Success Center" />
    </div>

    <div class="box">
      <h1>Drop-In Tutor Check-In System</h1>

      <div class="arrow-feedback-container">
        <div class="date-button">
            <button class="arrow-button" onclick="changeDate(-1)">&larr;</button>
              <span>DATE</span>
            <button class="arrow-button" onclick="changeDate(1)">&rarr;</button>
        </div>
        <button class="feedback-button">Access Feedback</button>
      </div>

      <div id="root"></div>
    </div>

    <!--Shifting of status implementation-->
    <script type="text/babel">
      const { useState } = React;

      const SECTIONS = ["late", "active", "upcoming", "cancelled", "completed"];

      const sectionLabel = {
        late: "Late Shifts",
        active: "Active Shifts",
        upcoming: "Upcoming Shifts",
        cancelled: "Cancelled Shifts",
        completed: "Completed Shifts",
      };

      // here is where the status options per section are determined
      const STATUS_OPTIONS = {
        late: ["Late", "Active", "Cancelled"],
        active: ["Active", "Cancelled"],
        upcoming: ["Upcoming", "Active", "Late", "Cancelled"],
        cancelled: ["Cancelled", "Active"],
        completed: [],
      };

      // and here is here tutors are currently filled in
      const currentTutors = [
        {
          id: 1,
          name: "NAME",
          start: "START TIME",
          end: "END TIME",
          course: "COURSE",
          section: "upcoming",
          availability: "Open",
        },
        {
          id: 2,
          name: "NAME",
          start: "START TIME",
          end: "END TIME",
          course: "COURSE",
          section: "upcoming",
          availability: "Open",
        },
        {
          id: 3,
          name: "NAME",
          start: "START TIME",
          end: "END TIME",
          course: "COURSE",
          section: "upcoming",
          availability: "Open",
        },
        {
          id: 4,
          name: "NAME",
          start: "START TIME",
          end: "END TIME",
          course: "COURSE",
          section: "upcoming",
          availability: "Open",
        },
        {
          id: 5,
          name: "NAME",
          start: "START TIME",
          end: "END TIME",
          course: "COURSE",
          section: "completed",
          availability: "Open",
        },
        {
          id: 6,
          name: "NAME",
          start: "START TIME",
          end: "END TIME",
          course: "COURSE",
          section: "completed",
          availability: "Open",
        },
      ];

      const ACTIVE_AVAILABILITY = ["Open", "Full"];

      // dictionaries to convert section and statuses
      const statusToSection = {
        Late: "late",
        Active: "active",
        Upcoming: "upcoming",
        Cancelled: "cancelled",
        Completed: "completed",
      };

      const sectionToStatus = {
        late: "Late",
        active: "Active",
        upcoming: "Upcoming",
        cancelled: "Cancelled",
        completed: "Completed",
      };

      function App() {
        const [tutors, setTutors] = useState(currentTutors);

        const changeSection = (id, newStatus) => {
          setTutors((prev) =>
            prev.map((t) =>
              t.id === id ? { ...t, section: statusToSection[newStatus] } : t,
            ),
          );
        };

        const changeAvailability = (id, val) => {
          setTutors((prev) =>
            prev.map((t) => (t.id === id ? { ...t, availability: val } : t)),
          );
        };

        // html is here
        return (
          <div>
            {SECTIONS.map((sec) => {
              const rows = tutors.filter((t) => t.section === sec);
              const opts = STATUS_OPTIONS[sec];
              const isActive = sec === "active";
              const isCompleted = sec === "completed";
              const colCount = isActive ? 6 : isCompleted ? 4 : 5;

              // Layout for each row
              return (
                <div className="section" key={sec}>
                  <div className={`section-title ${sec}`}>
                    {sectionLabel[sec]}
                  </div>
                  <table>
                    <thead>
                      <tr>
                        <th>Name</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Course</th>
                        {!isCompleted && <th>Status</th>}
                        {isActive && <th>Availability</th>}
                      </tr>
                    </thead>
                    <tbody>
                      {rows.length === 0 && (
                        <tr>
                          <td colSpan={colCount} className="empty-section">
                            No tutors
                          </td>
                        </tr>
                      )}
                      {rows.map((t) => (
                        <tr key={t.id}>
                          <td>{t.name}</td>
                          <td>{t.start}</td>
                          <td>{t.end}</td>
                          <td>{t.course}</td>
                          {!isCompleted && (
                            <td>
                              <select
                                value={sectionToStatus[t.setion]}
                                onChange={(e) =>
                                  changeSection(t.id, e.target.value)
                                }
                              >
                                {opts.map((o) => (
                                  <option key={o} value={o}>
                                    {o}
                                  </option>
                                ))}
                              </select>
                            </td>
                          )}
                          {isActive && (
                            <td className = {t.availability === "Full" ? "status-full" : "status-open"}>
                              <select
                                value={t.availability}
                                onChange={(e) =>
                                  changeAvailability(t.id, e.target.value)
                                }
                              >
                                {ACTIVE_AVAILABILITY.map((s) => (
                                  <option key={s} value={s}>
                                    {s}
                                  </option>
                                ))}
                              </select>
                            </td>
                          )}
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              );
            })}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
